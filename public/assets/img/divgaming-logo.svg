<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">DivGaming.com</title>
  <desc id="desc">DivGaming community command center logo inspired by Division SHD interface styling.</desc>
  <defs>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff9d2e"/>
      <stop offset="0.45" stop-color="#ff6b00"/>
      <stop offset="1" stop-color="#d84b00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 .38 0 0 .43  0 0 0 0 0  0 0 0 .9 0" result="orangeGlow"/>
      <feMerge><feMergeNode in="orangeGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="180" rx="22" fill="#080b0a" opacity="0"/>
  <g filter="url(#glow)">
    <circle cx="82" cy="88" r="53" fill="none" stroke="url(#orange)" stroke-width="10" stroke-dasharray="238 54" stroke-linecap="round"/>
    <path d="M82 34 L96 76 L140 76 L104 101 L118 145 L82 119 L47 145 L60 101 L25 76 L68 76 Z" fill="url(#orange)"/>
    <circle cx="82" cy="88" r="18" fill="#080b0a" stroke="#f7f7f2" stroke-width="6"/>
  </g>
  <g font-family="Arial Black, Impact, system-ui, sans-serif" font-weight="900" letter-spacing="-3">
    <text x="158" y="94" font-size="62" fill="#f7f7f2">Div</text>
    <text x="260" y="94" font-size="62" fill="url(#orange)">Gaming</text>
    <text x="158" y="132" font-family="Arial, system-ui, sans-serif" font-size="23" font-weight="800" letter-spacing="8" fill="#9ba8a4">.COM  //  AGENT HUB</text>
  </g>
</svg>
